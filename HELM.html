<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HELM Elevators Qatar - مصاعد HELM الدوحة</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --turquoise: #116992;
            --off-white: #fdfbf2;
            --gold: #d4af37;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--off-white);
            color: #333;
            line-height: 1.6;
        }

        nav {
            background-color: var(--turquoise);
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            border-bottom: 3px solid var(--gold);
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 900;
            color: var(--off-white);
        }

        .nav-links {
            list-style: none;
            display: flex;
        }

        .nav-links li { margin-right: 20px; }

        .nav-links a {
            text-decoration: none;
            color: var(--off-white);
            font-weight: 700;
            cursor: pointer;
        }

        /* --- تعديل قسم الهيرو لمنع التداخل --- */
        .hero {
            min-height: 100vh;
            background: linear-gradient(45deg, rgba(17, 105, 146, 0.9), rgba(253, 251, 242, 0.2));
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 120px 20px 60px; /* زيادة التباعد العلوي والسفلي */
        }

        .hero h1 {
            font-size: clamp(4rem, 10vw, 8rem); /* خط مرن يصغر مع الشاشة */
            font-weight: 900;
            color: var(--off-white);
            text-shadow: 4px 4px 0px var(--gold);
            margin-bottom: 20px; /* مسافة تحت الكلمة الكبيرة */
            line-height: 1.1;
        }

        .hero p {
            font-size: clamp(1.2rem, 4vw, 2rem);
            color: var(--off-white);
            background: var(--turquoise);
            padding: 10px 25px;
            border-radius: 50px;
            margin-bottom: 40px; /* مسافة كافية قبل الزر */
            max-width: 90%;
        }

        .btn-qatar {
            background-color: var(--gold);
            color: white;
            padding: 15px 40px;
            border-radius: 5px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            display: inline-block; /* لضمان عمل الهوامش بشكل صحيح */
            transition: 0.3s;
        }

        .btn-qatar:hover {
            background-color: #b8972f;
            transform: translateY(-5px);
        }

        .page-section {
            padding: 120px 10%;
            min-height: 80vh;
            display: none;
        }

        .page-section.active { display: block; }

        /* --- استجابة الجوال --- */
        @media (max-width: 768px) {
            nav {
                flex-direction: column;
                padding: 10px;
            }
            .nav-links { margin-top: 10px; }
            .nav-links li { margin: 0 8px; }
            
            .hero {
                padding-top: 150px; /* مساحة إضافية لأن الناف بار أصبح أكبر */
            }
            .hero h1 { margin-bottom: 15px; }
            .hero p { margin-bottom: 30px; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">HELM QATAR</div>
        <ul class="nav-links">
            <li><a onclick="navigateTo('home')">الرئيسية</a></li>
            <li><a onclick="navigateTo('about')">من نحن</a></li>
            <li><a onclick="navigateTo('services')">خدماتنا</a></li>
            <li><a onclick="navigateTo('contact')">اتصل بنا</a></li>
        </ul>
    </nav>

    <header id="home" class="page-section active">
        <div class="hero">
            <h1>HELM</h1>
            <p>الريادة في عالم المصاعد - الدوحة، قطر</p>
            <a class="btn-qatar" onclick="navigateTo('services')">اكتشف حلولنا</a>
        </div>
    </header>

    <section id="about" class="page-section">
        <h2 class="section-title">من نحن</h2>
        <p>تعد شركة <strong>HELM</strong> من الشركات الرائدة في قطر لتوريد وتركيب المصاعد.</p>
    </section>

    <section id="services" class="page-section">
        <h2 class="section-title">خدماتنا</h2>
        <p>نقدم حلولاً متكاملة للمصاعد والسلالم المتحركة.</p>
    </section>

    <section id="contact" class="page-section">
        <h2 class="section-title">تواصل معنا</h2>
        <p>البريد: info@helm-qatar.com</p>
    </section>

    <script>
        function showPage(pageId) {
            document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
            const target = document.getElementById(pageId);
            if(target) target.classList.add('active');
            window.scrollTo(0, 0);
        }

        function navigateTo(pageId) {
            showPage(pageId);
            history.pushState({pageId: pageId}, null, "#" + pageId);
        }

        window.onpopstate = function(event) {
            showPage(event.state ? event.state.pageId : 'home');
        };
    </script>

</body>
</html>
